spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

app.jwt-secret=dGVzdC1zZWNyZXQta2V5LWZvci10ZXN0aW5nLW9ubHktbXVzdC1iZS0yNTYtYml0cw==
app.jwt-expiration-ms=3600000

# Exclude springdoc auto-configuration entirely — 2.8.x is not compatible with Spring Framework 7.x
spring.autoconfigure.exclude=\
  org.springdoc.openapi.starter.webmvc.ui.SpringDocWebMvcUiAutoConfiguration,\
  org.springdoc.openapi.starter.webmvc.api.SpringDocWebMvcAutoConfiguration
